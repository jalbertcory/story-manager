<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Book spine -->
  <rect x="5" y="4" width="4" height="24" rx="1.5" fill="#4a6fa5"/>
  <!-- Book cover -->
  <rect x="9" y="4" width="18" height="24" rx="1.5" fill="#6b93d6"/>
  <!-- Pages edge (right side) -->
  <rect x="25" y="5" width="2" height="22" rx="1" fill="#e8eaf0"/>
  <!-- Lines on cover -->
  <rect x="12" y="10" width="10" height="2" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="12" y="14" width="8" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
  <rect x="12" y="18" width="9" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
</svg>
