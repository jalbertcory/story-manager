name: OmniVoice image

on:
  push:
    branches:
      - main
    paths:
      - services/omnivoice/**
      - .github/workflows/omnivoice-image.yml
  pull_request:
    branches:
      - main
    paths:
      - services/omnivoice/**
      - .github/workflows/omnivoice-image.yml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-omnivoice

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=main,enable=${{ github.event_name == 'push' }}
            type=ref,event=pr

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/omnivoice/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=omnivoice
          cache-to: type=gha,mode=max,scope=omnivoice
