name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e ".[dev]"
    - name: Check formatting with black
      run: |
        source .venv/bin/activate
        black --check backend
    - name: Check unused imports with autoflake
      run: |
        source .venv/bin/activate
        autoflake --check --remove-all-unused-imports --recursive backend
    - name: Lint with flake8
      run: |
        source .venv/bin/activate
        flake8 backend --count --statistics

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e ".[dev]"
    - name: Test with pytest
      run: |
        export PYTHONPATH=.
        source .venv/bin/activate
        pytest -m "not integration" backend/tests/

  migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"
    - name: Test PostgreSQL migrations
      run: make test-migrations

  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Audit Python dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"
        uvx pip-audit --path .venv/lib/python3.13/site-packages

  lint-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint with eslint
      run: npm run lint -- --max-warnings=0
    - name: Audit production dependencies
      run: |
        npm audit --omit=dev --audit-level=moderate
        npm audit --audit-level=high

  ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run UI tests
      run: npm test -- --run
